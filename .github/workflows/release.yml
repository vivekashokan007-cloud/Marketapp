name: Market Radar Signed Release

on:
  push:
    branches:
      - main
    paths:
      - 'app/build.gradle.kts'
      - 'gradle.properties'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Decode Keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > app/keystore.jks

      - name: Build Signed APK
        run: ./gradlew assembleRelease
        env:
          RELEASE_KEYSTORE_PATH: "keystore.jks"
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Get Version Name
        id: get_version
        run: |
          VERSION_NAME=$(grep "versionName =" app/build.gradle.kts | awk -F'"' '{print $2}')
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "tag=$VERSION_NAME" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION_NAME }}
          name: Market Radar v${{ env.VERSION_NAME }}
          files: app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: false
          body: |
            ### 🚀 Market Radar v${{ env.VERSION_NAME }}
            
            This is an automated signed release triggered by a version update.
            
            **Highlights:**
            - Unified Python Brain (v3)
            - Phase 4 "One Source of Truth" Architecture
            - Native Material 3 UI with Version Settings
            - Automated Supabase Trade Sync
            
            *Sha256: $(sha256sum app/build/outputs/apk/release/app-release.apk | awk '{ print $1 }')*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
